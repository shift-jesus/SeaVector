# ===================================================================
#  CONFIGURACIÓN DE BASE DE DATOS (VERSIÓN FINAL Y RECOMENDADA)
# ===================================================================
# Apunta a la BD dentro del classpath, ahora que el archivo está en src/main/resources.
spring.datasource.url=jdbc:sqlite:classpath:erosion.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Configuración de JPA y Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# 'validate' es la opción más segura para una BD que ya existe.
spring.jpa.hibernate.ddl-auto=validate

# Debug y Puerto
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8080
spring.sql.init.mode=never
